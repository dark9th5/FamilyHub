spring:
  datasource:
    url: jdbc:mysql://localhost:3306/family_network?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ${MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_SMTP_USERNAME:}
    password: ${GMAIL_SMTP_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

app:
  cors:
    allowed-origins: "*"
  security:
    jwt-secret: "family-super-secret-key-change-this-in-production-family-super-secret"
    access-token-seconds: 86400
  auth:
    otp-expire-minutes: 10
